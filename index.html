<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#141217" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FilmShelf" />

  <title>FilmShelf</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="page">
    <header class="hero">
      <div class="brand">
        <img class="brand-logo" src="./filmshelf-logo.svg" alt="FilmShelf logo">
      </div>

      <div class="hero-strip">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
    </header>

    <nav class="view-tabs">
      <button class="view-tab active" data-view="watchlist">To Watch</button>
      <button class="view-tab" data-view="watched">Watched</button>
    </nav>

    <section class="controls">
      <div class="tabs">
        <button class="tab active" data-type="all">All</button>
        <button class="tab" data-type="movie">Movies</button>
        <button class="tab" data-type="series">TV Series</button>
      </div>

      <div class="genres" id="genres"></div>
    </section>

    <section class="section-title">
      <div>
        <h2 id="shelfTitle">My film shelf</h2>
        <p id="shelfSubtitle">Movies waiting on your shelf</p>
      </div>
    </section>

    <section id="watchlist" class="film-strip"></section>
  </div>

  <button id="openModal" class="floating-add" aria-label="Add movie">+</button>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <button id="closeModal" class="close" aria-label="Close modal">×</button>

      <h2>Add to shelf</h2>

      <label class="image-picker">
        <input id="posterInput" type="file" accept="image/*">
        <span class="image-preview" id="imagePreview">
          <strong>+</strong>
          <small>Choose image</small>
        </span>
      </label>

      <label for="titleInput">Title</label>
      <input id="titleInput" placeholder="Movie title">

      <div class="grid">
        <div>
          <label for="typeInput">Type</label>
          <select id="typeInput">
            <option value="movie">Movie</option>
            <option value="series">TV Series</option>
          </select>
        </div>

        <div>
          <label for="yearInput">Year</label>
          <input id="yearInput" list="yearList" placeholder="2024" inputmode="numeric">
          <datalist id="yearList"></datalist>
        </div>
      </div>

      <div class="grid">
        <div>
          <label for="genreInput">Genre</label>
          <select id="genreInput"></select>
        </div>

        <div>
          <label for="countryInput">Country</label>
          <input id="countryInput" list="countryList" placeholder="France">
          <datalist id="countryList"></datalist>
        </div>
      </div>

      <button id="saveMovie" class="save">Add to shelf</button>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
